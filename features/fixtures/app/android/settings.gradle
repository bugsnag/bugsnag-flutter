include ':app'

def localPropertiesFile = new File(rootProject.projectDir, "local.properties")
def properties = new Properties()

assert localPropertiesFile.exists()
localPropertiesFile.withReader("UTF-8") { reader ->
    properties.load(reader)
}

def flutterSdkPath = properties.getProperty("flutter.sdk")
assert flutterSdkPath != null : "flutter.sdk not set in local.properties"

// Read Flutter version from the SDK
def flutterVersionFile = new File(flutterSdkPath, "version")
def flutterVersion = "0.0.0"

if (flutterVersionFile.exists()) {
    flutterVersion = flutterVersionFile.text.trim()
}

// Parse X.Y.Z → major/minor ints
def parts = flutterVersion.tokenize('.')
def major = parts.size() > 0 ? parts[0].toInteger() : 0
def minor = parts.size() > 1 ? parts[1].toInteger() : 0

// Flutter >= 3.16 uses declarative plugin block
def useDeclarative = (major > 3) || (major == 3 && minor >= 16)

if (useDeclarative) {
    println "Using declarative Flutter Gradle plugin (Flutter $flutterVersion)"

    plugins {
        id("dev.flutter.flutter-gradle-plugin") version "1.0.0"
    }

} else {
    println "Using legacy plugin loader (Flutter $flutterVersion)"

    apply from: "$flutterSdkPath/packages/flutter_tools/gradle/app_plugin_loader.gradle"
}
